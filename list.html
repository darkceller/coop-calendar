<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCGN-COOP 活動海報牆</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root { 
            --hcgn-green: #28a745; 
            --bg-gray: #f4f7f6;
            --type-health: #e84393; /* 養生保健 - 粉紅 */
            --type-outdoor: #0984e3; /* 戶外參訪 - 藍 */
            --type-handmake: #e67e22; /* 手作體驗 - 橘 */
            --type-meeting: #6c5ce7; /* 會議/講習 - 紫 */
            --type-default: #2d3436; /* 其他 - 深灰 */
        }
        
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: var(--bg-gray); margin: 0; padding: 20px; }
        
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: #1c1e21; margin-bottom: 10px; }
        
        .controls { text-align: center; margin-bottom: 30px; }
        .btn-download {
            background-color: var(--hcgn-green); color: white; border: none;
            padding: 10px 25px; border-radius: 50px; cursor: pointer;
            font-size: 16px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        .btn-download:hover { background-color: #218838; transform: scale(1.05); }

        /* 海報範圍容器 */
        #poster-area { 
            background: white; padding: 30px; border-radius: 15px; 
            max-width: 1100px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .poster-title { text-align: center; color: var(--hcgn-green); border-bottom: 2px double var(--hcgn-green); padding-bottom: 15px; margin-bottom: 25px; }

        .event-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 20px; 
        }

        .event-card {
            background: #fff; border: 1px solid #eee; border-radius: 12px; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* 動態顏色邊條 */
        .card-top-bar { height: 6px; width: 100%; }

        .card-content { padding: 18px; flex-grow: 1; }
        .date-tag { font-size: 13px; font-weight: bold; color: #666; margin-bottom: 8px; display: block; }
        .station-label { font-size: 12px; background: #f0f2f5; padding: 2px 8px; border-radius: 4px; color: #555; margin-bottom: 10px; display: inline-block; }
        
        .event-title { font-size: 19px; font-weight: bold; color: #333; margin: 5px 0 12px 0; line-height: 1.4; }
        
        /* 動態類型標籤 */
        .type-badge {
            display: inline-block; padding: 3px 12px; border-radius: 20px;
            color: white; font-size: 12px; font-weight: bold; margin-bottom: 10px;
        }

        .event-detail { font-size: 14px; color: #555; margin: 4px 0; }
        .event-detail b { color: #333; }
        .event-desc { font-size: 13px; color: #777; background: #fafafa; padding: 10px; border-radius: 8px; margin-top: 10px; border-left: 3px solid #ddd; }

        #loading { text-align: center; padding: 50px; font-size: 18px; color: #666; }
        #no-data { text-align: center; padding: 50px; display: none; color: #999; }
    </style>
</head>
<body>

<div class="header">
    <h1>主婦聯盟新竹分社</h1>
</div>

<div class="controls">
    <button class="btn-download" onclick="downloadPoster()">📥 下載活動月曆海報 (PNG)</button>
</div>

<div id="poster-area">
    <div class="poster-title">
        <h2 id="monthDisplay">活動月曆載入中...</h2>
        <p>歡迎社員踴躍報名參加！詳情請洽各站所。</p>
    </div>

    <div id="loading">讀取最新活動資訊...</div>
    <div id="no-data">目前尚無活動資料。</div>
    <div class="event-grid" id="eventGrid"></div>
</div>
<script>
    const spreadsheetId = '1wSLPWvV07NCUcheMy0xIUCikg9kv3V3hsD0jcmHVdZM'; 

    // 定義活動配色的邏輯
    function getTypeStyles(type) {
        if (type.includes("養生")) return { bg: 'var(--type-health)', bar: 'var(--type-health)' };
        if (type.includes("參訪") || type.includes("戶外")) return { bg: 'var(--type-outdoor)', bar: 'var(--type-outdoor)' };
        if (type.includes("手作") || type.includes("體驗")) return { bg: 'var(--type-handmake)', bar: 'var(--type-handmake)' };
        if (type.includes("會議") || type.includes("講習")) return { bg: 'var(--type-meeting)', bar: 'var(--type-meeting)' };
        return { bg: 'var(--type-default)', bar: 'var(--hcgn-green)' };
    }

    function getTargetSheetName() {
        const now = new Date();
        now.setMonth(now.getMonth() + 1); 
        let year = now.getFullYear() - 2000;
        let month = now.getMonth() + 1;
        const name = year + "年" + month + "月";
        document.getElementById('monthDisplay').innerText = "📅 " + name + " 活動月曆";
        return encodeURIComponent(name);
    }

    const sheetName = getTargetSheetName();
    const url = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=out:json&sheet=${sheetName}&tq=select%20*`;

    fetch(url)
        .then(res => res.text())
        .then(data => {
            const startIdx = data.indexOf('{');
            const endIdx = data.lastIndexOf('}');
            const jsonStr = data.substring(startIdx, endIdx + 1);
            const jsonData = JSON.parse(jsonStr);
            const rows = jsonData.table.rows;
            const grid = document.getElementById('eventGrid');
            document.getElementById('loading').style.display = 'none';

            if (!rows || rows.length <= 1) {
                document.getElementById('no-data').style.display = 'block';
                return;
            }

            let hasVisibleEvent = false;

            rows.forEach((row, index) => {
                if (index === 0) return; 
                const cols = row.c;
                if (!cols) return;

                const getVal = (idx) => (cols[idx] && cols[idx].v !== null) ? cols[idx].v.toString() : "";

                const note = getVal(10);
                if (note.includes("作廢")) return; 

                const title = getVal(7);
                if (!title) return; 

                hasVisibleEvent = true;
                const station = getVal(3);
                const dateRaw = getVal(4);
                const time = getVal(5);
                const type = getVal(6);
                const lecturer = getVal(8) || "無";
                const content = getVal(9);

                const styles = getTypeStyles(type);

                let displayDate = dateRaw;
                if (dateRaw.length >= 8) {
                    displayDate = dateRaw.substring(0,4) + "/" + dateRaw.substring(4,6) + "/" + dateRaw.substring(6,8);
                }

                const card = document.createElement('div');
                card.className = 'event-card';
                card.innerHTML = `
                    <div class="card-top-bar" style="background:${styles.bar}"></div>
                    <div class="card-content">
                        <span class="date-tag">🗓️ ${displayDate}</span>
                        <div class="type-badge" style="background:${styles.bg}">${type}</div>
                        <div class="station-label">📍 ${station}站</div>
                        <div class="event-title">${title}</div>
                        <div class="event-detail">🕒 <b>時間：</b>${time}</div>
                        <div class="event-detail">👤 <b>講師：</b>${lecturer}</div>
                        ${content ? `<div class="event-desc">${content}</div>` : ''}
                    </div>
                `;
                grid.appendChild(card);
            });

            if (!hasVisibleEvent) document.getElementById('no-data').style.display = 'block';
        });

    // 海報下載功能
    function downloadPoster() {
        const poster = document.getElementById('poster-area');
        const btn = document.querySelector('.btn-download');
        btn.innerText = "⏳ 製作中...";
        
        html2canvas(poster, {
            scale: 2, // 提升清晰度
            useCORS: true,
            backgroundColor: "#ffffff"
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = `HCGN-活動月曆-${new Date().getTime()}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
            btn.innerText = "📥 下載活動月曆海報 (PNG)";
        });
    }
</script>
</body>
</html>
