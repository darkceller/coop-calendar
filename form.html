<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCGN-COOP 活動月曆填報系統</title>
    <style>
        :root { 
            --hcgn-green: #28a745; 
            --dark-green: #1e7e34;
            --bg-color: #f8f9fa; 
        }
        
        body { 
            font-family: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; 
            padding: 20px 10px; 
            color: #333; 
        }

        .poster-logo-bar {
            background-color: var(--hcgn-green);
            padding: 25px 20px;
            text-align: center;
            max-width: 650px; 
            margin: 0 auto;
            border-radius: 15px 15px 0 0; 
            box-sizing: border-box;
        }
        .poster-logo-bar img {
            width: 70%;
            max-width: 400px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .container { 
            max-width: 650px; 
            margin: 0 auto 40px auto; 
            background: #fff; 
            padding: 30px; 
            border-radius: 0 0 15px 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            box-sizing: border-box;
        }

        h2 { 
            text-align: center; 
            color: #2c3e50; 
            margin: 10px 0 25px 0; 
            font-size: 1.6em;
            line-height: 1.4;
        }
        
        .notice-box {
            background-color: #fffcf0; 
            padding: 18px; 
            border-radius: 10px; 
            border-left: 6px solid #ffc107; 
            margin-bottom: 30px; 
            color: #665200; 
            font-size: 0.92em;
            line-height: 1.6;
        }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 0.95em; }
        label span { color: #e74c3c; margin-left: 4px; }
        
        input[type="text"], select { 
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; 
            box-sizing: border-box; font-size: 16px; transition: 0.3s;
        }
        input:focus, select:focus { border-color: var(--hcgn-green); outline: none; box-shadow: 0 0 0 3px rgba(40, 167, 69, 0.1); }

        button { 
            width: 100%; padding: 15px; background-color: var(--hcgn-green); 
            color: white; border: none; border-radius: 8px; font-size: 18px; 
            font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        button:hover { background-color: var(--dark-green); }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        .poster-footer {
            margin-top: 40px; 
            padding: 20px; 
            color: #95a5a6; 
            font-size: 13px; 
            line-height: 1.8;
            text-align: center;
        }

        /* Modal 彈窗樣式 */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #fff; padding: 30px; border-radius: 20px; max-width: 400px; width: 85%;
            text-align: center;
        }
        .modal-btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .modal-btn { border: none; padding: 12px 20px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 15px; }
        .btn-primary { background-color: var(--hcgn-green); color: white; }
        .btn-secondary { background-color: #636e72; color: white; }
    </style>
</head>
<body>

<div class="poster-logo-bar">
    <img src="logo.png" alt="主婦聯盟生活消費合作社 LOGO">
</div>

<div class="container" id="mainContainer">
    <h2>新竹分社<br>活動月曆資訊填報系統</h2>

    <div class="notice-box">
        <strong style="color: #b08800; font-size: 1.1em;">⚠️ 填報須知</strong>
        <ul style="margin: 10px 0 0 20px; padding: 0;">
            <li><strong>開放時間：</strong> 每月 1 日 08:00 至 25 日 17:00。</li>
            <li><strong>如何修正：</strong> 時限內對「同日期/站所/時間/活動名稱」重新填報即可覆蓋。</li>
            <li><strong>自動格式：</strong> 系統會自動轉為半形字並依日期歸檔月份。</li>
        </ul>
    </div>

    <form id="infoForm">
        <div class="form-group">
            <label>1. 姓名<span>*</span></label>
            <input type="text" name="name" placeholder="請輸入姓名" required>
        </div>

        <div class="form-group">
            <label>2. 社員編號<span>*</span></label>
            <input type="text" name="memberId" placeholder="請輸入編號" required>
        </div>

        <div class="form-group">
            <label>3. 主辦站所<span>*</span></label>
            <select name="station" required>
                <option value="">請選擇站所</option>
                <option value="中壢">中壢</option>
                <option value="龍潭">龍潭</option>
                <option value="桃園">桃園</option>
                <option value="國際">國際</option>
                <option value="新竹">新竹</option>
                <option value="關新">關新</option>
                <option value="縣府">縣府</option>
                <option value="三葉">三葉</option>
                <option value="竹北">竹北</option>
            </select>
        </div>

        <div class="form-group">
            <label>4. 活動日期 (yyyymmdd)<span>*</span></label>
            <input type="text" name="date" placeholder="範例：20260315" pattern="\d{8}" title="請輸入8碼數字格式" required>
        </div>

        <div class="form-group">
            <label>5. 活動開始與結束時間<span>*</span></label>
            <input type="text" name="timeRange" placeholder="範例：09:00-11:00" required>
        </div>

        <div class="form-group">
            <label>6. 活動類型<span>*</span></label>
            <select name="type" required>
                <option value="">請選擇類型</option>
                <option value="議題講座">議題講座</option>
                <option value="料理教作">料理教作</option>
                <option value="生產者面對面">生產者面對面</option>
                <option value="戶外參訪">戶外參訪</option>
                <option value="樂活養生">樂活養生</option>
                <option value="開心社團">開心社團</option>
                <option value="社務會議">社務會議</option>
                <option value="其他">其他</option>
            </select>
        </div>

        <div class="form-group">
            <label>7. 活動名稱<span>*</span></label>
            <input type="text" name="title" placeholder="請輸入名稱" required>
        </div>

        <div class="form-group">
            <label>8. 講師名稱 (選填)</label>
            <input type="text" name="lecturer" placeholder="無則免填">
        </div>

        <div class="form-group">
            <label>9. 活動內容 (15字以內)</label>
            <input type="text" name="content" maxlength="15" placeholder="請簡短描述">
        </div>

        <button type="submit" id="submitBtn">提交活動資料</button>
        
        <button type="button" onclick="window.location.href='index.html'" style="background:none; color:#95a5a6; font-size:14px; text-decoration:underline; border:none; margin-top:15px; cursor:pointer;">
            不做填報，直接查看目前成果
        </button>
    </form>
</div>

<div class="poster-footer">
    <div>版權所有 新竹分社活動月曆小組</div>
    <div>📧 系統維護：dark.celler@gmail.com</div>
</div>

<div class="modal-overlay" id="successModal">
    <div class="modal-content">
        <h3 style="color: var(--hcgn-green);">🎉 提交成功！</h3>
        <p>您的活動資訊已送出。<br><small>您可以選擇繼續填寫下一筆，或是查看成品。</small></p>
        <div class="modal-btn-group">
            <button class="modal-btn btn-primary" onclick="closeModal()">➕ 繼續填報下一筆</button>
            <button class="modal-btn btn-secondary" onclick="window.location.href='index.html'">🔍 查看海報結果</button>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwCmFtap49r2sdqCBL70tLU-qVXQrI945FUlI92G15cdIvTKJMAHEoYEjz85I2qD-yb/exec'; 

    const form = document.getElementById('infoForm');
    const mainContainer = document.getElementById('mainContainer');
    const submitBtn = document.getElementById('submitBtn');
    const modal = document.getElementById('successModal');

    function closeModal() {
        modal.style.display = 'none';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function checkTime() {
        const now = new Date();
        const day = now.getDate();
        const hour = now.getHours();
        const isOpen = (day > 1 && day < 25) || (day === 1 && hour >= 8) || (day === 25 && hour < 17);

        if (!isOpen) {
            mainContainer.innerHTML = `
                <div style="text-align: center; padding: 40px 20px;">
                    <h2 style="color: #e74c3c;">目前非開放填寫時間</h2>
                    <p>開放時段：每月 1 日 08:00 至 25 日 17:00</p>
                    <p style="color: #666;">現在時間：${now.toLocaleString()}</p>
                    <button onclick="window.location.href='index.html'" style="width:auto; padding:10px 20px; font-size:16px;">🔍 前往查看本月海報</button>
                </div>`;
            return false;
        }
        return true;
    }

    checkTime();

    form.addEventListener('submit', e => {
        e.preventDefault();
        if(!checkTime()) return;

        submitBtn.disabled = true;
        submitBtn.innerText = '正在傳送資料...';
        
        fetch(scriptURL, {
            method: 'POST',
            body: new FormData(form)
        })
        .then(response => {
            modal.style.display = 'flex';
            form.reset();
            submitBtn.disabled = false;
            submitBtn.innerText = '提交活動資料';
        })
        .catch(error => {
            alert('❌ 提交失敗，請檢查網路。');
            submitBtn.disabled = false;
            submitBtn.innerText = '提交活動資料';
        });
    });
</script>

</body>
</html>
