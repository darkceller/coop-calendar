<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主婦聯盟新竹分社活動月曆 5.6 (標題回歸修正版)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&family=Shippori+Mincho:wght@700;800;900&family=Noto+Serif+TC:wght@900&display=swap" rel="stylesheet">

    <style>
        :root { --bg-color: #f4f6f9; --hcgn-green: #2e7d32; }
        body { font-family: "Noto Sans TC", sans-serif; background-color: var(--bg-color); margin: 0; padding: 30px; }
        .upload-container { max-width: 1000px; margin: 0 auto 30px auto; background: white; padding: 30px; border-radius: 15px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        #drop-zone { border: 3px dashed #cbd5e1; padding: 40px 20px; border-radius: 10px; background: #f8fafc; cursor: pointer; margin-top: 15px; }
        #excel-file { display: none; }
        .controls { text-align: center; margin: 20px 0; display: flex; justify-content: center; gap: 15px; }
        .btn-download { color: white; border: none; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-size: 16px; font-weight: bold; display: none; }
        .btn-mix { background-color: #2e7d32; } .btn-taoyuan { background-color: #388e3c; } .btn-hsinchu { background-color: #43a047; }
        .preview-container { max-width: 1000px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; display: none; }
        .web-table { width: 100%; border-collapse: collapse; font-size: 14px; text-align: left; }
        .web-table th, .web-table td { padding: 10px; border-bottom: 1px solid #edf2f7; }

        /* ==================================================== */
        /* 🌟 海報渲染主區塊 */
        /* ==================================================== */
        #poster-area { 
            position: absolute; left: -9999px; top: -9999px; 
            background-color: #ffffff; width: 1190px; height: 1683px; 
            padding: 50px 65px 60px 65px; /* 回復原本的 padding，給標題空間 */
            box-sizing: border-box; display: flex; flex-direction: column;
            font-family: "Noto Sans TC", sans-serif !important; 
        }

        #poster-area.download-mode {
            position: static !important;
            background-image: url('background.png') !important; 
            background-size: cover !important;
            background-position: center top !important;
        }

        /* 🌟 消失的標題區塊回來了！ */
        .poster-header { position: relative; width: 100%; display: flex; flex-direction: column; align-items: center; margin-bottom: 50px; height: 160px;}
        
        .header-badge-circle {
            position: absolute; left: 0px; top: 0px; width: 130px; height: 130px;
            background-color: #2c5942; color: white; border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-family: Arial, sans-serif !important; 
        }
        .header-badge-circle .b-year { font-size: 18px; letter-spacing: 1px; margin-top: 5px; }
        .header-badge-circle .b-month { font-size: 64px; font-weight: 900; line-height: 1; margin: -2px 0 2px 0; }
        .header-badge-circle .b-text { font-size: 14px; font-weight: bold; letter-spacing: 1px; }

        .poster-main-title { 
            font-family: 'Shippori Mincho', 'Noto Serif TC', serif !important;
            font-size: 72px; font-weight: 900; color: #333333; margin: 15px 0 0 160px; letter-spacing: 6px; text-align: center; 
        }
        .poster-sub-title { 
            font-family: 'Shippori Mincho', 'Noto Serif TC', serif !important;
            font-size: 42px; font-weight: 900; color: #333333; margin-top: 10px; margin-left: 200px; letter-spacing: 2px; text-align: center; 
        }

        /* 內容區塊 */
        .poster-body-columns { display: flex; justify-content: space-between; width: 100%; position: relative; }
        .poster-column { width: 500px; display: flex; flex-direction: column; box-sizing: border-box; }
        .category-block { width: 100%; margin-bottom: 30px; }
        
        .category-header-title {
            position: relative; display: inline-block; z-index: 2;
            font-family: 'Shippori Mincho', 'Noto Serif TC', serif !important;
            font-size: 38px; font-weight: 900; color: #000000; margin-bottom: 25px; padding: 0 10px;
        }
        .category-header-title::after {
            content: ""; position: absolute; left: 0; right: 0; bottom: 4px; height: 18px; border-radius: 10px; z-index: -1;
        }
        .title-bg-health::after { background-color: #f8d7da; } 
        .title-bg-cook::after { background-color: #ffe8cc; } 
        .title-bg-op::after { display: none; } 
        .cat-icon { font-size: 32px; margin-right: 8px; filter: grayscale(100%) opacity(70%); } 

        .event-item-row { width: 100%; margin-bottom: 25px; display: flex; flex-direction: column; gap: 8px; }
        
        .event-item-meta { font-family: "Noto Sans TC", sans-serif; font-size: 26px; color: #555; font-weight: 700; letter-spacing: 1px; }
        .event-item-meta .poster-date { color: #1b5e20; font-weight: 900; } 
        
        .event-item-title { 
            font-family: 'Shippori Mincho', 'Noto Serif TC', serif !important;
            font-size: 32px; font-weight: 900; color: #444444; line-height: 1.3; padding-left: 5px; 
        }

        .section-divider { border-top: 3px dotted #718096; margin: 15px 0 30px 0; width: 90%; }

        /* QR Code 絕對定位 */
        .poster-qr-container {
            position: absolute;
            left: 655px;   /* 數字越大越靠右，可依需求微調 */
            bottom: 232px; /* 數字越大越靠上，可依需求微調 */
            z-index: 10;
        }
        .poster-qr-img { width: 150px; height: 150px; display: block; border-radius: 10px; }
        
    </style>
</head>
<body>

<div class="upload-container">
    <h2>主婦聯盟新竹分社活動月曆產生器 5.6 (標題回歸版) 📊</h2>
    <div id="drop-zone" onclick="document.getElementById('excel-file').click()">
        <p id="drop-text" style="font-weight:bold;">拖曳 Excel 檔案至此區域，或點擊選取檔案</p>
        <input type="file" id="excel-file" onchange="handleFile(this.files)" accept=".xlsx, .xls">
    </div>
</div>

<div class="controls">
    <button class="btn-download btn-mix" id="btn-mix" onclick="generatePoster('mix')">📥 下載 桃竹混排海報</button>
    <button class="btn-download btn-taoyuan" id="btn-taoyuan" onclick="generatePoster('taoyuan')">📥 下載 桃園區海報</button>
    <button class="btn-download btn-hsinchu" id="btn-hsinchu" onclick="generatePoster('hsinchu')">📥 下載 新竹區海報</button>
</div>

<div class="preview-container" id="previewContainer">
    <div class="preview-title">👀 資料讀取預覽：</div>
    <div class="web-table-wrapper">
        <table class="web-table">
            <thead><tr><th>站所</th><th>時間</th><th>類型</th><th>活動名稱</th></tr></thead>
            <tbody id="webPreviewBody"></tbody>
        </table>
    </div>
</div>

<div id="poster-area">
    
    <div class="poster-header">
        <div class="header-badge-circle">
            <span class="b-year" id="badgeYear">2026</span>
            <span class="b-month" id="badgeMonth">6</span>
            <span class="b-text">MONTH</span>
        </div>
        <h1 class="poster-main-title">主婦聯盟消費合作社</h1>
        <div class="poster-sub-title" id="posterSubTitle">新竹分社 | 活動月曆</div>
    </div>

    <div class="poster-body-columns">
        <div class="poster-column">
            <div class="category-block" id="block-養生" style="display: none;">
                <div class="category-header-title title-bg-health"><span class="cat-icon">👨‍👩‍👧‍👦</span> 樂活養生</div>
                <div id="container-養生"></div>
            </div>
            
            <div id="left-divider" class="section-divider" style="display: none;"></div>

            <div class="category-block" id="block-料理" style="display: none;">
                <div class="category-header-title title-bg-cook"><span class="cat-icon">🍲</span> 料理教做</div>
                <div id="container-料理"></div>
            </div>
        </div>

        <div class="poster-column">
            <div class="category-block" id="block-營運" style="display: none;">
                <div class="category-header-title title-bg-op"><span class="cat-icon">📖</span> 地區營運</div>
                <div id="container-營運"></div>
            </div>
        </div>
    </div>

    <div class="poster-qr-container">
        <img src="qrcode.png" alt="報名QR" class="poster-qr-img">
    </div>
</div>

<script>
    let processedRows = []; 

    function handleFile(files) {
        if (!files || files.length === 0) return;
        document.getElementById('drop-text').innerText = `已載入：${files[0].name}`;
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
            cleanAndLoadData(json);
        };
        reader.readAsArrayBuffer(files[0]);
    }

    function cleanAndLoadData(matrix) {
        if (!matrix || matrix.length < 2) return;
        const headers = matrix[0].map(h => h ? h.toString().trim() : "");
        const idxType = headers.findIndex(h => h.includes("類型"));
        const idxName = headers.findIndex(h => h.includes("名稱"));
        const idxTime = headers.findIndex(h => h.includes("時間") || h.includes("日期"));
        const idxStation = headers.findIndex(h => h.includes("主辦") || h.includes("站所") || h.includes("單位"));

        processedRows = [];
        const previewBody = document.getElementById('webPreviewBody');
        previewBody.innerHTML = "";

        for (let i = 1; i < matrix.length; i++) {
            const row = matrix[i];
            if (!row || !row[idxName]) continue;

            let rawName = row[idxName].toString().trim();
            rawName = rawName.replace(/^[\d\/\.\-\s]+年?[\d\/\.\-\s]+月?[\d\/\.\-\s]+日?\s*/, '').replace(/^[\d]+[\/\.][\d]+\s*/, '');

            const item = {
                station: row[idxStation] ? row[idxStation].toString().trim() : "",
                rawTime: row[idxTime] ? row[idxTime].toString().trim() : "",
                originalType: row[idxType] ? row[idxType].toString().trim() : "其他",
                name: rawName
            };

            if (item.name === "活動名稱" || item.originalType.includes("作廢")) continue;
            processedRows.push(item);

            previewBody.innerHTML += `<tr><td>${item.station}</td><td>${item.rawTime}</td><td>${item.originalType}</td><td>${item.name}</td></tr>`;
        }

        document.getElementById('previewContainer').style.display = 'block';
        document.querySelectorAll('.btn-download').forEach(btn => btn.style.display = 'inline-block');
    }

    function mapToCanvaCategory(typeStr) {
        if (!typeStr) return "營運";
        const t = typeStr.toString();
        if (t.includes("料理") || t.includes("教作") || t.includes("教做")) return "料理";
        if (t.includes("社務") || t.includes("會議") || t.includes("地區") || t.includes("營運")) return "營運";
        return "養生"; 
    }

    function formatTimeAndStationHtml(item) {
        let dateStr = ""; let timeStr = "";
        
        try {
            // 解析日期
            const dateMatch = item.rawTime.match(/(\d{4})[-/](\d{1,2})[-/](\d{1,2})/);
            if (dateMatch) {
                const m = parseInt(dateMatch[2], 10);
                const d = parseInt(dateMatch[3], 10);
                const eventDate = new Date(parseInt(dateMatch[1],10), m - 1, d);
                const weekDays = ["日", "一", "二", "三", "四", "五", "六"];
                dateStr = `${m}/${d} (${weekDays[eventDate.getDay()]})`;
            }

            // 🌟 重新改寫的暴力時間擷取器 (徹底解決痛點)
            // 直接在字串中找出所有像是 10:00 這種格式的時間
            const times = item.rawTime.match(/\d{1,2}:\d{2}/g);
            if (times && times.length >= 2) {
                // 如果抓到兩個時間，就用 '-' 連接起來
                timeStr = `${times[0]}- ${times[1]}`;
            } else if (times && times.length === 1) {
                // 如果只有一個時間
                timeStr = times[0];
            }
        } catch (e) {}

        // 清洗站所字眼
        let rawS = item.station;
        let isTaoyuan = ["桃園", "中壢", "國際", "龍潭"].some(t => rawS.includes(t));
        let prefix = isTaoyuan ? "桃園" : "新竹";
        
        let cleanName = rawS.replace(/桃園|新竹|縣|市|東區|站所|站/g, "").trim();
        if (cleanName === "") cleanName = isTaoyuan ? "桃園" : "新竹"; 
        
        const locationText = `${prefix}${cleanName}站`;
        
        return `<span class="poster-date">${dateStr}</span> <span class="poster-time">${timeStr}</span> <span class="poster-location">${locationText}</span>`;
    }

    function generatePoster(mode) {
        document.getElementById('container-養生').innerHTML = "";
        document.getElementById('container-料理').innerHTML = "";
        document.getElementById('container-營運').innerHTML = "";
        
        document.getElementById('block-養生').style.display = "none";
        document.getElementById('block-料理').style.display = "none";
        document.getElementById('block-營運').style.display = "none";
        document.getElementById('left-divider').style.display = "none";

        const taoyuanList = ["桃園", "中壢", "國際", "龍潭"];
        
        const filtered = processedRows.filter(item => {
            const isTaoyuan = taoyuanList.some(t => item.station.includes(t));
            if (mode === 'taoyuan' && !isTaoyuan) return false;
            if (mode === 'hsinchu' && isTaoyuan) return false;
            return true;
        });
        filtered.sort((a, b) => a.rawTime.localeCompare(b.rawTime));

        filtered.forEach(item => {
            const cat = mapToCanvaCategory(item.originalType);
            document.getElementById(`container-${cat}`).innerHTML += `
                <div class="event-item-row">
                    <div class="event-item-meta">${formatTimeAndStationHtml(item)}</div>
                    <div class="event-item-title">${item.name}</div>
                </div>`;
            document.getElementById(`block-${cat}`).style.display = "block";
        });

        // 判斷是否需要加上分隔線
        if(document.getElementById('block-養生').style.display === "block" && document.getElementById('block-料理').style.display === "block") {
            document.getElementById('left-divider').style.display = "block";
        }

        // 🌟 寫入動態標題文字
        if (filtered.length > 0) {
            const match = filtered[0].rawTime.match(/(\d{4})[-/](\d{1,2})/);
            if (match) { 
                document.getElementById('badgeYear').innerText = match[1]; 
                document.getElementById('badgeMonth').innerText = parseInt(match[2], 10); 
            }
        }
        
        let subTitleText = "新竹分社 | 活動月曆";
        if (mode === 'taoyuan') subTitleText = "新竹分社 | 活動月曆 (桃園區)";
        if (mode === 'hsinchu') subTitleText = "新竹分社 | 活動月曆 (新竹區)";
        document.getElementById('posterSubTitle').innerText = subTitleText;

        const poster = document.getElementById('poster-area');
        poster.classList.add('download-mode');
        const btn = document.getElementById(mode === 'mix' ? 'btn-mix' : (mode === 'taoyuan' ? 'btn-taoyuan' : 'btn-hsinchu'));
        const originalText = btn.innerText; btn.innerText = "⏳ 繪製中..."; btn.disabled = true;

        setTimeout(() => {
            html2canvas(poster, { scale: 3, useCORS: true, windowWidth: 1190, windowHeight: 1683 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `活動月曆-完成版-${mode}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
                poster.classList.remove('download-mode'); btn.innerText = originalText; btn.disabled = false;
            });
        }, 800);
    }
</script>
</body>
</html>
