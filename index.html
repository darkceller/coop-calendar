<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主婦聯盟消費合作社新竹分社活動月曆資訊填報系統</title>
    <style>
        :root { --primary-color: #28a745; --bg-color: #f4f7f6; }
        body { font-family: "Microsoft JhengHei", Arial, sans-serif; background-color: var(--bg-color); line-height: 1.6; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        .signature { text-align: right; color: #666; font-weight: bold; margin-top: 0; font-size: 0.9em; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 0.95em; }
        label span { color: #e74c3c; margin-left: 4px; }
        input[type="text"], input[type="date"], select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background-color: var(--primary-color); color: white; border: none; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #218838; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #message { margin-top: 20px; padding: 15px; border-radius: 6px; display: none; text-align: center; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <h2>主婦聯盟消費合作社新竹分社<br>活動月曆資訊填報系統</h2>
    <p class="signature">新竹分社活動月曆小組 謹啟</p>

    <div style="background-color: #fff3cd; padding: 20px; border-radius: 8px; border-left: 6px solid #ffc107; margin-bottom: 25px; color: #856404; line-height: 1.6;">
        <h3 style="margin-top: 0; color: #b08800; font-size: 1.1em; display: flex; align-items: center;">
            ⚠️ 填報須知 (請務必閱讀)
        </h3>
        <ul style="margin: 10px 0 10px 20px; padding: 0; font-size: 0.95em;">
            <li><strong>開放時間：</strong> 每月 <span style="color: #d9534f; font-weight: bold;">1 日 08:00 至 25 日 17:00</span>，逾時系統自動關閉。</li>
            <li><strong>如何修正：</strong> 於時限內針對「相同日期、站所與時間」重新填報即可自動覆蓋舊資料。</li>
            <li><strong>自動格式：</strong> 系統會將數字與英文強制轉為半形，並依活動日期自動歸檔月份。</li>
            <li><strong>勞務費：</strong> 以填寫之「姓名/編號」為撥付依據，請務必填寫實際領款人。</li>
            <li><strong>刪除與逾期：</strong> 需整筆刪除請來信告知；<span style="text-decoration: underline; font-weight: bold;">逾期恕不接受人工補件或修改</span>。</li>
        </ul>
        <hr style="border: 0; border-top: 1px solid #ffeeba; margin: 12px 0;">
        <p style="margin: 0; font-size: 0.85em; color: #666; text-align: center;">
            📧 系統維護與刪除申請：<a href="mailto:dark.celler@gmail.com" style="color: #007bff; text-decoration: none;">dark.celler@gmail.com</a>
        </p>
    </div>

    <form id="infoForm">
        </form>
</div>

    <form id="infoForm"> <div class="form-group">
            <label>1. 姓名<span>*</span></label>
            <input type="text" name="name" placeholder="請輸入姓名" required>
        </div>

        <div class="form-group">
            <label>2. 社員編號<span>*</span></label>
            <input type="text" name="memberId" placeholder="請輸入編號" required>
        </div>

        <div class="form-group">
            <label>3. 主辦站所<span>*</span></label>
            <select name="station" required>
                <option value="">請選擇站所</option>
                <option value="中壢">中壢</option>
                <option value="龍潭">龍潭</option>
                <option value="桃園">桃園</option>
                <option value="國際">國際</option>
                <option value="新竹">新竹</option>
                <option value="關新">關新</option>
                <option value="縣府">縣府</option>
                <option value="三葉">三葉</option>
                <option value="竹北">竹北</option>
            </select>
        </div>

        <div class="form-group">
            <label>4. 活動日期 (yyyymmdd)<span>*</span></label>
            <input type="text" name="date" placeholder="範例：20260315" pattern="\d{8}" title="請輸入8碼數字格式" required>
        </div>

        <div class="form-group">
            <label>5. 活動開始與結束時間<span>*</span></label>
            <input type="text" name="timeRange" placeholder="範例：09:00-11:00" required>
        </div>

        <div class="form-group">
            <label>6. 活動類型<span>*</span></label>
            <select name="type" required>
                <option value="">請選擇類型</option>
                <option value="議題講座">議題講座</option>
                <option value="料理教作">料理教作</option>
                <option value="生產者面對面">生產者面對面</option>
                <option value="戶外參訪">戶外參訪</option>
                <option value="社務會議">社務會議</option>
                <option value="開心社團">開心社團</option>
                <option value="其他">其他</option>
            </select>
        </div>

        <div class="form-group">
            <label>7. 活動名稱<span>*</span></label>
            <input type="text" name="title" placeholder="請輸入名稱" required>
        </div>

        <div class="form-group">
            <label>8. 講師名稱 (選填)</label>
            <input type="text" name="lecturer" placeholder="無則免填">
        </div>

        <div class="form-group">
            <label>9. 活動內容 (15字以內)</label>
            <input type="text" name="content" maxlength="15" placeholder="請簡短描述">
        </div>

        <button type="submit" id="submitBtn">提交資料</button>
    </form>
    
    <div id="message"></div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwCmFtap49r2sdqCBL70tLU-qVXQrI945FUlI92G15cdIvTKJMAHEoYEjz85I2qD-yb/exec'; 

    const form = document.getElementById('infoForm');
    const mainContainer = document.getElementById('mainContainer');
    const msgBox = document.getElementById('message');
    const submitBtn = document.getElementById('submitBtn');

    function checkTime() {
        const now = new Date();
        const day = now.getDate();
        const hour = now.getHours();
        
        const isOpen = (day > 1 && day < 25) || 
                       (day === 1 && hour >= 8) || 
                       (day === 25 && hour < 17);

        if (!isOpen) {
            mainContainer.innerHTML = `
                <div class="error-overlay">
                    <h2 style="color: #e74c3c;">目前非開放填寫時間</h2>
                    <p>開放時段：每月 1 號 08:00 至 25 號 17:00</p>
                    <p style="color: #666;">現在時間：${now.toLocaleString()}</p>
                </div>`;
            return false;
        }
        return true;
    }

    // 初始化檢查
    checkTime();

    form.addEventListener('submit', e => {
        e.preventDefault();
        if(!checkTime()) return;

        submitBtn.disabled = true;
        submitBtn.innerText = '傳送中...';
        
        // 修正點：使用 FormData 並移除 no-cors 確保資料能被 GAS 正確讀取
        fetch(scriptURL, {
            method: 'POST',
            body: new FormData(form)
        })
        .then(response => {
            msgBox.style.display = 'block';
            msgBox.style.backgroundColor = '#d4edda';
            msgBox.style.color = '#155724';
            msgBox.style.border = '1px solid #c3e6cb';
            msgBox.innerHTML = `
                <strong>資料已成功送出！</strong><br>
                <small>若填寫錯誤，直接重新填報正確版即可，系統會自動取代舊資料。<br>
                如有多筆資料可繼續填寫。<br>
                本訊息將在 15 秒後自動關閉。</small>`;

            form.reset();
            submitBtn.disabled = false;
            submitBtn.innerText = '提交資料';

            setTimeout(() => { msgBox.style.display = 'none'; }, 15000);
        })
        .catch(error => {
            console.error('Error!', error.message);
            msgBox.style.display = 'block';
            msgBox.style.backgroundColor = '#f8d7da';
            msgBox.style.color = '#721c24';
            msgBox.innerText = '❌ 提交失敗，請確認網址正確或聯絡維護者。';
            submitBtn.disabled = false;
            submitBtn.innerText = '提交資料';
        });
    });
</script>

</body>
</html>
