<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>活動資訊收集</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 20px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background: #4CAF50; color: white; padding: 10px 20px; border: none; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <h2>活動資訊填報</h2>
    <form id="infoForm">
        <div class="form-group"><label>1. 姓名 (必填)</label><input type="text" name="name" required></div>
        <div class="form-group"><label>2. 社員編號 (必填)</label><input type="text" name="memberId" required></div>
        <div class="form-group">
            <label>3. 主辦站所 (必填)</label>
            <select name="station" required>
                <option value="">請選擇</option>
                <option>中壢</option><option>龍潭</option><option>桃園</option><option>國際</option>
                <option>新竹</option><option>關新</option><option>縣府</option><option>三葉</option><option>竹北</option>
            </select>
        </div>
        <div class="form-group"><label>4. 活動日期 (yyyymmdd)</label><input type="text" name="date" placeholder="例如: 20240520" required></div>
        <div class="form-group"><label>5. 活動開始與結束時間 (24點制)</label><input type="text" name="timeRange" placeholder="例如: 14:00-16:00" required></div>
        <div class="form-group">
            <label>6. 活動類型 (必填)</label>
            <select name="type" required>
                <option value="">請選擇</option>
                <option>議題講座</option><option>料理教作</option><option>生產者面對面</option>
                <option>戶外參訪</option><option>社務會議</option><option>開心社團</option><option>其他</option>
            </select>
        </div>
        <div class="form-group"><label>7. 活動名稱 (必填)</label><input type="text" name="title" required></div>
        <div class="form-group"><label>8. 講師名稱 (選填)</label><input type="text" name="lecturer"></div>
        <div class="form-group"><label>9. 活動內容 (15字以內)</label><input type="text" name="content" maxlength="15"></div>
        
        <button type="submit" id="submitBtn">提交資料</button>
    </form>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyOXeuHhgL6T3gem5_4Az8faxboNJfuijjM1KF50gtYCj5ekzGmZ0T0wiII2_0PiJOM/exec'; // 填入你在第一步得到的網址
        const form = document.getElementById('infoForm');

        form.addEventListener('submit', e => {
            e.preventDefault();
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors', // 避開跨網域問題
                body: JSON.stringify(data),
                headers: { 'Content-Type': 'application/json' }
            }).then(() => {
                alert('資料已送出！');
                form.reset();
            }).catch(error => alert('出錯了：' + error.message));
        });
    </script>
</body>
</html>
