<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主婦聯盟新竹分社活動月曆產生器 5.4 (精準對齊版)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Shippori+Mincho:wght@700;800;900&family=Noto+Serif+TC:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { 
            --bg-color: #f4f6f9; 
            --hcgn-green: #28a745; 
            --text-main: #2d3436;
        }
        
        body { font-family: "Noto Sans TC", sans-serif; background-color: var(--bg-color); margin: 0; padding: 30px 15px; }

        .upload-container { max-width: 1000px; margin: 0 auto 30px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        .upload-container h2 { margin: 0; color: #2d3748; }
        #drop-zone { border: 3px dashed #cbd5e1; padding: 40px 20px; border-radius: 10px; background: #f8fafc; cursor: pointer; transition: 0.2s; margin-top: 15px; }
        #drop-zone:hover { border-color: var(--hcgn-green); background: #f0fdf4; }
        #excel-file { display: none; }

        .preview-container { max-width: 1000px; margin: 0 auto 40px auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .preview-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; color: #1e293b; }
        .web-table-wrapper { overflow-x: auto; max-height: 350px; border: 1px solid #e2e8f0; border-radius: 8px; }
        .web-table { width: 100%; border-collapse: collapse; font-size: 14px; text-align: left; }
        .web-table th { background: #f1f5f9; padding: 12px; font-weight: bold; position: sticky; top: 0; border-bottom: 2px solid #cbd5e1; }
        .web-table td { padding: 12px; border-bottom: 1px solid #edf2f7; }

        .controls { text-align: center; margin: 20px 0; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;}
        .btn-download { color: white; border: none; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-size: 16px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: none; transition: 0.3s; }
        .btn-download:hover { transform: translateY(-2px); }
        .btn-mix { background-color: #2e7d32; } .btn-taoyuan { background-color: #388e3c; } .btn-hsinchu { background-color: #43a047; }

        /* ==================================================== */
        /* 🌟 Canva 雙欄海報渲染主區塊 */
        /* ==================================================== */
        #poster-area { 
            position: absolute; left: -9999px; top: -9999px; 
            background-color: #ffffff; width: 1190px; height: 1683px; 
            padding: 60px 45px 230px 45px; box-sizing: border-box;
            display: flex; flex-direction: column;
            font-family: "Noto Sans TC", sans-serif !important; 
        }

        #poster-area.download-mode {
            position: static !important;
            background-image: url('background.png') !important; 
            background-size: cover !important;
            background-position: center top !important;
        }

        .poster-header { position: relative; width: 100%; display: flex; flex-direction: column; align-items: center; margin-bottom: 55px; }
        
        .header-badge-circle {
            position: absolute; left: 15px; top: 0px; width: 120px; height: 120px;
            background-color: #1b5e20; color: white; border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-family: Arial, sans-serif !important; 
        }
        .header-badge-circle .b-year { font-size: 18px; letter-spacing: 1px; margin-top: 5px; }
        .header-badge-circle .b-month { font-size: 58px; font-weight: 900; line-height: 1; margin: -2px 0 2px 0; }
        .header-badge-circle .b-text { font-size: 13px; font-weight: bold; letter-spacing: 1px; }

        .poster-main-title { 
            font-family: 'Shippori Mincho', 'Noto Serif TC', serif !important;
            font-size: 64px; font-weight: 900; color: #333333; margin: 0 0 0 100px; letter-spacing: 4px; text-align: center; 
        }
        .poster-sub-title { 
            font-family: 'Shippori Mincho', 'Noto Serif TC', serif !important;
            font-size: 40px; font-weight: 900; color: #333333; margin-top: 15px; margin-left: 100px; letter-spacing: 2px; text-align: center; 
        }

        .poster-body-columns { display: flex; justify-content: space-between; width: 100%; flex-grow: 1; position: relative; margin-bottom: 0px; }
        
        /* 縮小直欄內的元素間距，防止內容過多被往下擠破版 */
        .poster-column { width: 510px; display: flex; flex-direction: column; gap: 20px; box-sizing: border-box; }
        .category-block { width: 100%; }
        
        .category-header-title {
            font-family: 'Shippori Mincho', 'Noto Serif TC', serif !important;
            font-size: 30px; font-weight: 900; color: #000000; padding: 6px 25px; border-radius: 30px; display: inline-block; margin-bottom: 15px;
        }
        .bg-style-養生 { background-color: #fce4e4; }
        .bg-style-料理 { background-color: #ffecd2; }
        .bg-style-營運 { background-color: #e2e8f0; }

        .event-item-row { width: 100%; margin-bottom: 18px; display: flex; flex-direction: column; gap: 4px; }
        
        .event-item-meta { font-family: "Noto Sans TC", sans-serif; font-size: 24px; color: #444; font-weight: 700; }
        .event-item-meta .poster-date { color: #1b5e20; font-weight: 900; } 
        
        .event-item-title { 
            font-family: 'Shippori Mincho', 'Noto Serif TC', serif !important;
            font-size: 30px; font-weight: 900; color: #000000; line-height: 1.3; padding-left: 2px; 
        }
        
        .event-divider { border-top: 2px dotted #aed581; margin-top: 10px; width: 100%; }

        /* ==================================================== */
        /* 🌟 QR Code 絕對定位區：將圖片精準釘在底圖的框框內 */
        /* ==================================================== */
        .poster-qr-container {
            position: absolute;
            /* 💡 如果 QR Code 偏左或偏右，請微調這裡的 left 數值 (例如改為 640px 或 660px) */
            left: 650px; 
            /* 💡 如果 QR Code 偏上或偏下，請微調這裡的 bottom 數值 (例如改為 250px 或 270px) */
            bottom: 265px; 
            z-index: 10;
        }
        .poster-qr-img { width: 145px; height: 145px; display: block; }
        
    </style>
</head>
<body>

<div class="upload-container">
    <h2>主婦聯盟新竹分社活動月曆產生器 5.4 📊</h2>
    <p style="color:#64748b; margin-top:6px;">直接讀取原始 Excel 試算表。系統已優化時間讀取與精準排版定位。</p>
    <div id="drop-zone" onclick="document.getElementById('excel-file').click()">
        <p style="font-size: 16px; color: #334155; font-weight: bold;" id="drop-text">拖曳 Excel 檔案至此區域，或點擊選取檔案</p>
        <input type="file" id="excel-file" onchange="handleFile(this.files)" accept=".xlsx, .xls">
    </div>
</div>

<div class="controls">
    <button class="btn-download btn-mix" id="btn-mix" onclick="generatePoster('mix')">📥 下載 桃竹混排海報</button>
    <button class="btn-download btn-taoyuan" id="btn-taoyuan" onclick="generatePoster('taoyuan')">📥 下載 桃園區海報</button>
    <button class="btn-download btn-hsinchu" id="btn-hsinchu" onclick="generatePoster('hsinchu')">📥 下載 新竹區海報</button>
</div>

<div class="preview-container" id="previewContainer" style="display: none;">
    <div class="preview-title">👀 原始資料清洗預覽：</div>
    <div class="web-table-wrapper">
        <table class="web-table">
            <thead>
                <tr>
                    <th>主辦站所</th>
                    <th>原始舉辦時間</th>
                    <th>原始活動類型</th>
                    <th>活動名稱</th>
                    <th>講師</th>
                </tr>
            </thead>
            <tbody id="webPreviewBody"></tbody>
        </table>
    </div>
</div>

<div id="poster-area">
    <div class="poster-header">
        <div class="header-badge-circle">
            <span class="b-year" id="badgeYear">2026</span>
            <span class="b-month" id="badgeMonth">6</span>
            <span class="b-text">MONTH</span>
        </div>
        <h1 class="poster-main-title">主婦聯盟消費合作社</h1>
        <div class="poster-sub-title" id="posterSubTitle">新竹分社 | 活動月曆</div>
    </div>

    <div class="poster-body-columns">
        <div class="poster-column">
            <div class="category-block" id="block-養生" style="display: none;">
                <div class="category-header-title bg-style-養生"><i class="fa-solid fa-user-group" style="color: #555; margin-right: 6px;"></i> 樂活養生</div>
                <div id="container-養生"></div>
            </div>
            <div class="category-block" id="block-料理" style="display: none;">
                <div class="category-header-title bg-style-料理"><i class="fa-solid fa-utensils" style="color: #555; margin-right: 6px;"></i> 料理教做</div>
                <div id="container-料理"></div>
            </div>
        </div>

        <div class="poster-column">
            <div class="category-block" id="block-營運" style="display: none;">
                <div class="category-header-title bg-style-營運"><i class="fa-solid fa-book-open" style="color: #555; margin-right: 6px;"></i> 地區營運</div>
                <div id="container-營運"></div>
            </div>
        </div>
    </div>

    <div class="poster-qr-container">
        <img src="qrcode.png" alt="報名QR" class="poster-qr-img">
    </div>
</div>

<script>
    let processedRows = []; 
    let finalYear = "2026";
    let finalMonth = "6";

    function handleFile(files) {
        if (!files || files.length === 0) return;
        document.getElementById('drop-text').innerText = `已選取檔案：${files[0].name}`;
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
            cleanAndLoadData(json);
        };
        reader.readAsArrayBuffer(files[0]);
    }

    function cleanAndLoadData(matrix) {
        if (!matrix || matrix.length < 2) return;
        const headers = matrix[0].map(h => h ? h.toString().trim() : "");
        
        const idxType = headers.findIndex(h => h.includes("類型"));
        const idxName = headers.findIndex(h => h.includes("名稱"));
        const idxTime = headers.findIndex(h => h.includes("時間") || h.includes("日期"));
        const idxStation = headers.findIndex(h => h.includes("主辦") || h.includes("站所") || h.includes("單位"));
        const idxLecturer = headers.findIndex(h => h.includes("講師") || h.includes("講者"));

        processedRows = [];
        const previewBody = document.getElementById('webPreviewBody');
        previewBody.innerHTML = "";

        for (let i = 1; i < matrix.length; i++) {
            const row = matrix[i];
            if (!row || !row[idxName]) continue;

            let rawName = row[idxName].toString().trim();
            rawName = rawName.replace(/^[\d\/\.\-\s]+年?[\d\/\.\-\s]+月?[\d\/\.\-\s]+日?\s*/, '')
                             .replace(/^[\d]+[\/\.][\d]+\s*/, '');

            const item = {
                station: row[idxStation] ? row[idxStation].toString().trim() : "新竹",
                rawTime: row[idxTime] ? row[idxTime].toString().trim() : "",
                originalType: row[idxType] ? row[idxType].toString().trim() : "其他",
                name: rawName,
                lecturer: row[idxLecturer] ? row[idxLecturer].toString().trim() : "---"
            };

            if (item.name === "活動名稱" || item.originalType.includes("作廢")) continue;
            processedRows.push(item);

            const tr = document.createElement('tr');
            tr.innerHTML = `<td><b>${item.station}</b></td><td>${item.rawTime}</td><td>${item.originalType}</td><td>${item.name}</td><td>${item.lecturer}</td>`;
            previewBody.appendChild(tr);
        }

        if (processedRows.length > 0) {
            const match = processedRows[0].rawTime.match(/(\d{4})[-/](\d{1,2})/);
            if (match) { finalYear = match[1]; finalMonth = parseInt(match[2], 10).toString(); }
        }

        document.getElementById('previewContainer').style.display = 'block';
        document.querySelectorAll('.btn-download').forEach(btn => btn.style.display = 'inline-block');
        document.getElementById('previewContainer').scrollIntoView({ behavior: 'smooth' });
    }

    function mapToCanvaCategory(typeStr) {
        if (!typeStr) return "營運";
        const t = typeStr.toString();
        if (t.includes("料理") || t.includes("教作") || t.includes("教做")) return "料理";
        if (t.includes("社務") || t.includes("會議") || t.includes("地區") || t.includes("營運")) return "營運";
        return "養生"; 
    }

    function formatTimeAndStationHtml(item) {
        let dateStr = item.rawTime;
        let timeStr = "00:00";
        
        try {
            const parts = item.rawTime.split(" ");
            if (parts.length >= 1) {
                const dateParts = parts[0].split(/[-/]/);
                if (dateParts.length === 3) {
                    const m = parseInt(dateParts[1], 10);
                    const d = parseInt(dateParts[2], 10);
                    const eventDate = new Date(parseInt(dateParts[0],10), m - 1, d);
                    const weekDays = ["日", "一", "二", "三", "四", "五", "六"];
                    dateStr = `${m}/${d} (${weekDays[eventDate.getDay()]})`;
                }
            }
            
            // 🌟 修正：精準抓取 Excel 中 "10:00 - 12:00" 的時間區間
            const tMatch = item.rawTime.match(/(\d{1,2}:\d{2})\s*[-~]\s*(\d{1,2}:\d{2})/);
            if (tMatch) {
                timeStr = `${tMatch[1]}-${tMatch[2]}`;
            } else {
                const tMatchSingle = item.rawTime.match(/(\d{1,2}:\d{2})/);
                if (tMatchSingle) timeStr = tMatchSingle[1];
            }
        } catch (e) {}

        // 🌟 修正：脫衣再穿衣的無敵站所判斷法 (杜絕 "新竹新竹" 或 "桃園桃園")
        let s = item.station;
        const isTaoyuan = ["桃園", "中壢", "國際", "龍潭"].some(t => s.includes(t));
        const prefix = isTaoyuan ? "桃園" : "新竹";
        
        // 先強迫把所有的縣市名、站名贅字脫掉
        let cleanS = s.replace(/桃園|新竹/g, "").replace(/站所/g, "").replace(/分社/g, "").replace(/站/g, "").trim();
        
        // 補救機制：如果脫乾淨之後什麼都不剩了，代表原本就是大站
        if(cleanS === "" && isTaoyuan) cleanS = "桃園";
        if(cleanS === "" && !isTaoyuan) cleanS = "新竹";

        const locationText = `${prefix}${cleanS}站`;
        
        return `<span class="poster-date">${dateStr}</span> <span class="poster-time">${timeStr}</span> <span class="poster-location">${locationText}</span>`;
    }

    function generatePoster(mode) {
        document.getElementById('container-養生').innerHTML = "";
        document.getElementById('container-料理').innerHTML = "";
        document.getElementById('container-營運').innerHTML = "";
        
        document.getElementById('block-養生').style.display = "none";
        document.getElementById('block-料理').style.display = "none";
        document.getElementById('block-營運').style.display = "none";

        const taoyuanList = ["桃園", "中壢", "國際", "龍潭"];
        
        const filtered = processedRows.filter(item => {
            const isTaoyuan = taoyuanList.some(t => item.station.includes(t));
            if (mode === 'taoyuan' && !isTaoyuan) return false;
            if (mode === 'hsinchu' && isTaoyuan) return false;
            return true;
        });
        filtered.sort((a, b) => a.rawTime.localeCompare(b.rawTime));

        filtered.forEach(item => {
            const cat = mapToCanvaCategory(item.originalType);
            const container = document.getElementById(`container-${cat}`);
            document.getElementById(`block-${cat}`).style.display = "block";

            const metaHtml = formatTimeAndStationHtml(item);
            const rowDiv = document.createElement('div');
            rowDiv.className = "event-item-row";
            
            const lecturerSuffix = (item.lecturer && item.lecturer !== "---" && item.lecturer !== "無") ? `～${item.lecturer}` : "";

            rowDiv.innerHTML = `
                <div class="event-item-meta">${metaHtml}</div>
                <div class="event-item-title">${item.name}${lecturerSuffix}</div>
                <div class="event-divider"></div>
            `;
            container.appendChild(rowDiv);
        });

        document.getElementById('badgeYear').innerText = finalYear;
        document.getElementById('badgeMonth').innerText = finalMonth;
        
        let subTitleText = "新竹分社 | 活動月曆";
        if (mode === 'taoyuan') subTitleText = "新竹分社 | 活動月曆 (桃園區)";
        if (mode === 'hsinchu') subTitleText = "新竹分社 | 活動月曆 (新竹區)";
        document.getElementById('posterSubTitle').innerText = subTitleText;

        const poster = document.getElementById('poster-area');
        poster.classList.add('download-mode');

        const btn = document.getElementById(mode === 'mix' ? 'btn-mix' : (mode === 'taoyuan' ? 'btn-taoyuan' : 'btn-hsinchu'));
        const originalText = btn.innerText;
        btn.innerText = "⏳ 印刷級海報繪製中...";
        btn.disabled = true;

        setTimeout(() => {
            html2canvas(poster, { 
                scale: 3, 
                useCORS: true,
                windowWidth: 1190,
                windowHeight: 1683
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `活動月曆-${finalYear}年${finalMonth}月-${mode === 'mix' ? '全分社' : (mode === 'taoyuan' ? '桃園區' : '新竹區')}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
                
                poster.classList.remove('download-mode');
                btn.innerText = originalText;
                btn.disabled = false;
            });
        }, 600);
    }
</script>
</body>
</html>
